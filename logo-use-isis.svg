<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Use Isis</title>
  <style>
    .logo-nome { font-family: 'Georgia', serif; font-size: 36px; font-weight: normal; fill: #2D2D2D; letter-spacing: 8px; }
    .logo-sub  { font-family: 'Georgia', serif; font-size: 12px; font-weight: normal; fill: #D4A96A; letter-spacing: 5px; }
  </style>
  <g transform="translate(340, 100)">
    <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#C8637A" opacity="0.9" transform="rotate(0)"/>
